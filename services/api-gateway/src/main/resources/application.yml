server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  profiles:
    default: local
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service-users
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/users/**
payflow:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: 15
    refresh-token-expiration-minutes: 10080
management:
  endpoints:
    web:
      exposure:
        include: health,info # Chỉ mở endpoint health check cho Phase 0